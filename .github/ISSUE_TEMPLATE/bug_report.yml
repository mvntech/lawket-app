name: Bug Report
description: Report a bug in Lawket
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: >
        Describe what went wrong
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to Cases
        2. Click Add case
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Desktop (Chrome)
        - Desktop (Firefox)
        - Desktop (Safari)
        - iPhone (Safari PWA)
        - Android (Chrome PWA)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 1.0.0
