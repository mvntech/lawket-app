name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: https://staging.lawket.app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quick quality check
        run: |
          pnpm tsc --noEmit
          pnpm lint
          pnpm test:run

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Deploy to Vercel staging
        run: |
          vercel deploy \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            2>&1 | tee deploy-output.txt

          # Extract preview URL
          DEPLOY_URL=$(grep -o \
            'https://[^ ]*\.vercel\.app' \
            deploy-output.txt | head -1)

          echo "STAGING_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Run DB migrations
        run: |
          npx supabase db push \
            --project-ref ${{ secrets.STAGING_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Health check staging
        run: |
          sleep 20
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null \
              -w "%{http_code}" \
              "$STAGING_URL/api/health" \
              || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

      - name: Comment deploy URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Staging deployed: ' + process.env.STAGING_URL
            })
